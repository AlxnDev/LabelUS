<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALXNMANE | Artist</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(black, #0d1117);
  color: white;
  text-align: center;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 10px;
  z-index: 1000;
}

.navbar a {
  color: #ff4d12;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  padding: 120px 20px 60px;
}

.hero h1 {
  font-size: 48px;
}

/* ARTIST */
.artist {
  font-size: 24px;
  font-weight: bold;
}

/* INSIGNIA */
.badge {
  color: #1da1f2;
  font-weight: bold;
  margin-left: 5px;
  cursor: pointer;
}

#badgeText {
  color: #1da1f2;
  opacity: 0;
  transition: 0.3s;
}

/* BOTONES */
.btn {
  display: block;
  padding: 15px;
  margin: 10px auto;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  max-width: 300px;
  transition: 0.3s;
  border: none;
}

.btn:hover {
  transform: scale(1.05);
}

.spotify { background: #1db954; }
.youtube { background: #ff0000; }
.instagram { background: linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); }

/* USER */
#userInfo {
  margin-top: 10px;
  color: #1da1f2;
}

</style>
</head>

<body>

<div class="navbar">
  <a href="#">Inicio</a>
  <a href="#music">Música</a>
  <a href="#links">Redes</a>
  <a href="#contact">Contacto</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>ALXNMANE</h1>

  <p class="artist">
    Artist <span class="badge">Ⓥ</span>
  </p>

  <div id="badgeText">Artista Verificado</div>

  <!-- LOGIN -->
  <button class="btn" style="background:#4285F4" onclick="loginWithGoogle()">
    🔐 Iniciar sesión con Google
  </button>

  <div id="userInfo"></div>

  <p>Creador de música electrónica 🚀</p>

  <button class="btn spotify" onclick="window.open('https://open.spotify.com/artist/6mnuWCFpmaODxdTvsJeEI6')">
    Escuchar en Spotify
  </button>
</div>

<!-- CONTACTO -->
<div class="section" id="contact">
  <h2>📩 Contacto</h2>

  <!-- USO CORRECTO (GMAIL WEB) -->
  <a class="btn instagram"
     href="https://mail.google.com/mail/?view=cm&to=alxnmane@gmail.com&subject=Contacto%20desde%20web"
     target="_blank">
    Enviar Email
  </a>
</div>

<script>

/* 🔥 TU CONFIG DE FIREBASE (REEMPLAZA ESTO CON EL TUYO) */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN CON GOOGLE */
function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      const user = result.user;

      document.getElementById("userInfo").innerHTML = `
        👤 ${user.displayName}<br>
        📧 ${user.email}<br>
        🆔 ${user.uid}
      `;
    })
    .catch(err => console.log(err));
}

/* MANTENER SESIÓN */
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("userInfo").innerHTML = `
      👤 ${user.displayName}<br>
      📧 ${user.email}<br>
      🆔 ${user.uid}
    `;
  }
});

/* INSIGNIA */
document.querySelector(".badge").onclick = () => {
  const t = document.getElementById("badgeText");
  t.style.opacity = t.style.opacity === "1" ? "0" : "1";
};

</script>

</body>
</html>
