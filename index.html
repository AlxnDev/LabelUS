<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALXNMANE | Artist</title>

<!-- SEO -->
<meta name="description" content="ALXNMANE - Artista de música electrónica y funk.">
<meta property="og:title" content="ALXNMANE | Artist">
<meta property="og:description" content="Música electrónica & funk">
<meta property="og:type" content="website">

<!-- FUENTE PRO -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(black, #0d1117);
  color: white;
  text-align: center;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 10px;
  z-index: 1000;
}

.navbar a {
  color: #ff4d12;
  margin: 10px;
  text-decoration: none;
  font-weight: 600;
}

.navbar a:hover {
  color: white;
}

/* HERO */
.hero {
  padding: 130px 20px 60px;
  animation: fadeIn 1s ease-in;
}

.hero h1 {
  font-size: 52px;
}

/* INSIGNIA */
.artist {
  font-size: 28px;
  font-weight: 600;
}

.badge {
  font-size: 22px;
  margin-left: 8px;
  cursor: pointer;
  color: #1da1f2;
  text-shadow: 0 0 10px #1da1f2;
  transition: 0.3s;
}

.badge:hover {
  transform: scale(1.2);
}

/* TEXT VERIFY */
#badgeText {
  margin-top: 5px;
  color: #1da1f2;
  opacity: 0;
  transition: 0.3s;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* CARDS */
.card {
  background: #111;
  padding: 20px;
  margin: 10px auto;
  border-radius: 12px;
  max-width: 400px;
}

/* BOTONES */
.btn {
  display: block;
  padding: 15px;
  margin: 10px auto;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  max-width: 300px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.spotify { background: #1db954; }
.youtube { background: #ff0000; }
.instagram { background: linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); }
.tiktok { background: linear-gradient(45deg,#000,#25F4EE,#FE2C55); }

/* BOTÓN ARRIBA */
#topBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff4d12;
  border: none;
  padding: 12px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
  display: none;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="navbar">
  <a href="#">Inicio</a>
  <a href="#music">Música</a>
  <a href="#links">Redes</a>
  <a href="#contact">Contacto</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>ALXNMANE</h1>

  <p class="artist">
    Artist 
    <span class="badge" onclick="toggleBadge()">Ⓥ</span>
  </p>

  <div id="badgeText">Artista Verificado</div>

  <p>Creador de música electrónica & funk 🚀</p>

  <button class="btn spotify" onclick="window.open('https://open.spotify.com/artist/6mnuWCFpmaODxdTvsJeEI6')">
    Escuchar en Spotify
  </button>

  <button class="btn" style="background:#ff4d12" onclick="copyLink()">
    Copiar link 🔗
  </button>
</div>

<!-- MUSIC -->
<div class="section" id="music">
  <h2>🎧 Último lanzamiento</h2>

  <iframe 
    src="https://open.spotify.com/embed/artist/6mnuWCFpmaODxdTvsJeEI6"
    width="300" height="380" frameborder="0">
  </iframe>
</div>

<!-- LINKS -->
<div class="section" id="links">
  <h2>🌐 Redes</h2>

  <a class="btn spotify" href="https://open.spotify.com/artist/6mnuWCFpmaODxdTvsJeEI6" target="_blank">Spotify</a>
  <a class="btn youtube" href="https://youtube.com/@alxnmanexzmusic" target="_blank">YouTube</a>
  <a class="btn instagram" href="https://www.instagram.com/alxnmanemusic" target="_blank">Instagram</a>
  <a class="btn tiktok" href="https://tiktok.com/@alxnmanegzmusic" target="_blank">TikTok</a>
</div>

<!-- CONTACTO -->
<div class="section" id="contact">
  <h2>📩 Contacto</h2>

  <div class="card">
    <p>¿Quieres trabajar conmigo?</p>

    <a class="btn instagram"
       href="https://mail.google.com/mail/?view=cm&to=alxnmane@gmail.com&subject=Contacto%20desde%20web"
       target="_blank">
      Enviar Email
    </a>
  </div>
</div>

<button id="topBtn">⬆</button>

<script>

// BOTÓN ARRIBA
const topBtn = document.getElementById("topBtn");

window.onscroll = () => {
  topBtn.style.display = window.scrollY > 300 ? "block" : "none";

  // animación scroll
  document.querySelectorAll('.section').forEach(sec => {
    const top = window.innerHeight;
    const pos = sec.getBoundingClientRect().top;

    if(pos < top - 100){
      sec.classList.add('show');
    }
  });
};

topBtn.onclick = () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
};

// INSIGNIA
let visible = false;

function toggleBadge() {
  const text = document.getElementById("badgeText");
  visible = !visible;
  text.style.opacity = visible ? "1" : "0";
}

// COPIAR LINK
function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copiado 🔗");
}

</script>

</body>
  </html>
